services:
  # ====== CLIENT (Next.js) ======
  - type: web
    name: bn-client
    env: docker
    rootDir: client
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: bn-server
          type: web
          property: url
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    buildCommand: "" # folosim Dockerfile
    startCommand: "" # folosim CMD din Dockerfile

  # ====== SERVER (Express API) ======
  - type: web
    name: bn-server
    env: docker
    rootDir: server
    plan: starter
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: CORS_ORIGIN
        fromService:
          name: bn-client
          type: web
          property: url
      - key: HF_API_KEY
        sync: false # seteză din Dashboard → Secrets
      - key: GROQ_API_KEY
        sync: false
      # Redis (managed) – trimitem connection string direct
      - key: REDIS_URL
        fromService:
          name: bn-redis
          type: redis
          property: connectionString
      # Qdrant – serviciu privat: luăm host/port și le folosim în cod
      - key: QDRANT_HOST
        fromService:
          name: bn-qdrant
          type: private_service
          property: host
      - key: QDRANT_PORT
        value: "6333"
      - key: UPLOAD_DIR
        value: "/app/uploads"
    disks:
      - name: uploads
        mountPath: /app/uploads
        sizeGB: 2
    buildCommand: ""
    startCommand: ""

  # ====== WORKER (BullMQ) ======
  - type: worker
    name: bn-worker
    env: docker
    rootDir: server
    plan: starter
    autoDeploy: true
    envVars:
      - key: HF_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: bn-redis
          type: redis
          property: connectionString
      - key: QDRANT_HOST
        fromService:
          name: bn-qdrant
          type: private_service
          property: host
      - key: QDRANT_PORT
        value: "6333"
      - key: UPLOAD_DIR
        value: "/app/uploads"
    # suprascriem comanda din Dockerfile ca să pornească worker-ul
    startCommand: "node worker.js"

  # ====== QDRANT (serviciu privat în Docker) ======
  - type: private_service
    name: bn-qdrant
    env: docker
    autoDeploy: true
    dockerCommand: "" # folosim imaginea direct
    runtime: docker
    image:
      url: qdrant/qdrant:latest
    plan: starter
    ports:
      - port: 6333
        protocol: tcp
    disks:
      - name: qdrant-storage
        mountPath: /qdrant/storage
        sizeGB: 2

databases:
  # ====== Redis (Managed) ======
  - name: bn-redis
    plan: starter
    ipAllowList: [] # accesabil doar din serviciile Render
