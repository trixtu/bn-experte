version: "3.9"

services:
  server:
    build: ./server
    container_name: server
    ports:
      - "8000:8000"
    environment:
      - HF_API_KEY=${HF_API_KEY}        # Hugging Face API Key
      - GROQ_API_KEY=${GROQ_API_KEY}    # Groq API Key
      - REDIS_URL=${REDIS_URL}          # Redis URL complet
      - QDRANT_URL=${QDRANT_URL}        # Qdrant URL dacă folosești
      - PORT=8000
    volumes:
      - ./server:/app
    command: sh -c "npm install && npm run dev:worker && npm run dev"